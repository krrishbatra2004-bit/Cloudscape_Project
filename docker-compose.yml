# ==============================================================================
# CLOUDSCAPE NEXUS 5.0 (AETHER) - ENTERPRISE INFRASTRUCTURE MESH
# ==============================================================================
# Compose V2 Specification (Obsolete 'version' tag removed)
# Provisions the Graph Intelligence Database, State Differentials Cache, 
# and the Multi-Cloud API Simulators (Standard LocalStack & Azurite).
# ==============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "3"

services:
  # ------------------------------------------------------------------------------
  # 1. NEO4J GRAPH INTELLIGENCE ENGINE (GDS + APOC)
  # ------------------------------------------------------------------------------
  neo4j-gds:
    image: neo4j:5.17.0-enterprise
    container_name: cloudscape_neo4j_engine
    hostname: neo4j-engine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # High-Speed Bolt Protocol
    environment:
      # Licensing & Auth
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/Cloudscape2026!}
      
      # Advanced Plugin Auto-Provisioning
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      
      # JVM Memory Tuning (Critical for 100,000+ synthetic nodes)
      - NEO4J_dbms_memory_heap_initial__size=${NEO4J_HEAP_INITIAL:-2G}
      - NEO4J_dbms_memory_heap_max__size=${NEO4J_HEAP_MAX:-4G}
      - NEO4J_dbms_memory_pagecache_size=${NEO4J_PAGECACHE:-1G}
      
      # Database Security & Routing
      - NEO4J_dbms_default__database=neo4j
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
    volumes:
      - ./volume/neo4j_data:/data
      - ./volume/neo4j_logs:/logs
      - ./volume/neo4j_import:/var/lib/neo4j/import
      - ./volume/neo4j_plugins:/plugins
    networks:
      - cloudscape_mesh
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ------------------------------------------------------------------------------
  # 2. REDIS STATE DIFFERENTIAL CACHE
  # ------------------------------------------------------------------------------
  redis-cache:
    image: redis:7.2-alpine
    container_name: cloudscape_redis_cache
    hostname: redis-cache
    restart: unless-stopped
    command: >
      --save 60 1
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ./volume/redis_data:/data
    networks:
      - cloudscape_mesh
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ------------------------------------------------------------------------------
  # 3. LOCALSTACK STANDARD (AWS API SIMULATOR)
  # ------------------------------------------------------------------------------
  # [AETHER FIX] Reverted to standard image to prevent Pro module crashes.
  # Explicitly loading only the services required by the Discovery Engine.
  localstack-aws:
    image: localstack/localstack:latest
    container_name: cloudscape_localstack_aws
    hostname: localstack-aws
    restart: unless-stopped
    ports:
      - "4566:4566"            # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      # Explicit Service Boot to preserve RAM and eliminate socket drops
      - SERVICES=iam,s3,ec2,rds,sts
      - DEBUG=${DEBUG:-0}
      - ENFORCE_IAM=0          # Disabled strict IAM validation for local mock discovery
      - PERSISTENCE=0          # Disabled to keep container completely ephemeral and fast
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./volume/localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cloudscape_mesh
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ------------------------------------------------------------------------------
  # 4. AZURITE (AZURE STORAGE SIMULATOR)
  # ------------------------------------------------------------------------------
  # [AETHER FIX] Injected --skipApiVersionCheck to bypass SDK version drifting.
  azurite-azure:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: cloudscape_azurite_azure
    hostname: azurite-azure
    restart: unless-stopped
    command: "azurite --loose --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --debug /data/debug.log --skipApiVersionCheck"
    ports:
      - "10000:10000" # Blob Service
      - "10001:10001" # Queue Service
      - "10002:10002" # Table Service
    environment:
      - AZURE_DISABLE_TELEMETRY=1
      - AZURE_TELEMETRY_DISABLED=1
    volumes:
      - ./volume/azure_data:/data
    networks:
      - cloudscape_mesh
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

# ==============================================================================
# ISOLATED NETWORK TOPOLOGY
# ==============================================================================
networks:
  cloudscape_mesh:
    name: cloudscape_mesh
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1