        - "bcdr-iso-22301"
      endpoint_url: "http://127.0.0.1:4566"
      description: "European standby. Target for Ransomware cross-region replication wipes."

  # ----------------------------------------------------------------------------
  # [PROJ-ML-06] SHADOW AI & DATA POISONING MESH (NEW)
  # ----------------------------------------------------------------------------
  # Purpose: Enterprise AI Sandbox. Emulates AWS Bedrock Base Models, SageMaker 
  # Notebooks, and DynamoDB Feature Stores.
  - id: "PROJ-ML-06"
    name: "AI_Intelligence_Sandbox"
    provider: "aws"
    environment_type: "sandbox"
    credentials:
      aws_access_key_id: "T-ML-ACCESS-KEY"
      aws_secret_access_key: "T-ML-SECRET-KEY"
      aws_account_id: "333344445555"
      aws_default_region: "us-west-2"
    tags:
      data_sensitivity: "CRITICAL_IP"
      compliance_frameworks: 
        - "nist-ai-rmf"
        - "internal-ip-protection"
