# ==============================================================================
# PROJECT CLOUDSCAPE: ENTERPRISE TENANT REGISTRY (NEXUS v5.2 TITAN) 
# THE SUPREME SOVEREIGN-FORENSIC CONFIGURATION MATRIX
# ==============================================================================
# This registry defines the physical, logical, and cryptographic boundaries of 
# the multi-account/multi-cloud data mesh. The orchestrator spawns independent 
# asynchronous worker pools for each tenant block dynamically mapping them across
# AWS, Azure, and Hybrid environments.
#
# STRICT TYPE-SAFE VALIDATION ENFORCEMENT RULES (core/config.py):
# - provider: 'aws', 'azure', 'gcp', 'multi'
# - environment_type: 'production', 'development', 'sandbox', 'dr', 'finance', 
#                     'shared-services', 'testing', 'staging', 'mock'
#
# 5.2 TITAN CAPABILITIES (ACTIVATED):
# 1. Zero-None Guarantee: All IDs have mathematically stable cryptographic fallbacks.
# 2. HCS Metadata Flags: Native Risk-Scorer overrides seeded via declarative YAML tags.
# 3. Compliance Tagging Matrix: CIS v8, PCI-DSS v4.0, HIPAA, and custom frameworks.
# 4. Mesh-Segmentation Bindings: Explicit network routing anchors per tenant.
# ==============================================================================

tenants:

  # ----------------------------------------------------------------------------
  # [PROJ-FIN-01] THE HIGH-SECURITY DATA VAULT (TARGET ZERO)
  # ----------------------------------------------------------------------------
  # Purpose: The crown jewels. Emulates the central data warehouse holding 
  # encrypted RDS clusters, PII S3 buckets, and KMS Master Keys.
  - id: "PROJ-FIN-01"
    name: "Finance_Data_Vault"
    provider: "aws"
    environment_type: "production"
    credentials:
      aws_access_key_id: "T-FIN-ACCESS-KEY"
      aws_secret_access_key: "T-FIN-SECRET-KEY"
      aws_account_id: "111122223333"
      aws_default_region: "us-east-1"
    tags:
      data_sensitivity: "CRITICAL_PII"
      compliance_frameworks: 
        - "pci-dss-v4"
        - "sox-itgc"
        - "gdpr-art32"
      network_segmentation: "tier-1-isolated"
      endpoint_url: "http://127.0.0.1:4566"
      description: "Highest security posture. Target for sophisticated serverless data exfiltration."
      threat_model: "APT29_EMULATION"
      hcs_baseline_multiplier: 1.5
      crown_jewel_paths:
        - "arn:aws:rds:us-east-1:111122223333:cluster:corp-finance"
        - "arn:aws:s3:::corp-finance-vault-primary"
      # Zero-Trust parameters (Overridden by config.py)
      mtls_enforced: true
      tailscale_exit_node: "nyc-primary-01"

  # ----------------------------------------------------------------------------
  # [PROJ-WEB-02] THE PUBLIC ATTACK SURFACE (DMZ)
  # ----------------------------------------------------------------------------
  # Purpose: The vulnerable perimeter. Contains Public ALBs, WAFs, and EC2 
  # web servers. Has a hidden cross-account trust established to Finance.
  - id: "PROJ-WEB-02"
    name: "Customer_Facing_Web"
    provider: "aws"
    environment_type: "development"
    credentials:
      aws_access_key_id: "T-WEB-ACCESS-KEY"
      aws_secret_access_key: "T-WEB-SECRET-KEY"
      aws_account_id: "444455556666"
      aws_default_region: "us-east-1"
    tags:
      data_sensitivity: "LOW"
      compliance_frameworks: 
        - "cis-benchmark-v8"
      network_segmentation: "tier-3-dmz"
      endpoint_url: "http://127.0.0.1:4566"
      description: "Front-door infrastructure. Target for Initial Access via WAF Bypass."
      threat_model: "INITIAL_ACCESS"
      hcs_baseline_multiplier: 1.0
      vulnerability_density: "HIGH"
      public_ingress_points:
        - "0.0.0.0/0"
        - "::/0"

  # ----------------------------------------------------------------------------
  # [PROJ-SHR-03] THE NETWORK BACKBONE
  # ----------------------------------------------------------------------------
  # Purpose: Transit Gateway hub, VPC Peering mesh.
  - id: "PROJ-SHR-03"
    name: "Shared_Infrastructure_Hub"
    provider: "aws"
    environment_type: "shared-services"
    credentials:
      aws_access_key_id: "T-SHR-ACCESS-KEY"
      aws_secret_access_key: "T-SHR-SECRET-KEY"
      aws_account_id: "777788889999"
      aws_default_region: "us-east-1"
    tags:
      data_sensitivity: "MEDIUM"
      compliance_frameworks: 
        - "internal-network-audit"
      network_segmentation: "tier-2-transit"
      endpoint_url: "http://127.0.0.1:4566"
      description: "Central router. Simulates lateral network movement conditions."

  # ----------------------------------------------------------------------------
  # [PROJ-AZURE-04] THE CROSS-CLOUD IDENTITY PROVIDER
  # ----------------------------------------------------------------------------
  # Purpose: Mocks Azure Active Directory (Entra ID) and KeyVault. Exposes the 
  # highly advanced Cross-Cloud OIDC federation vulnerabilities.
  - id: "PROJ-AZURE-04"
    name: "Azure_Identity_Core"
    provider: "azure"
    environment_type: "shared-services" 
    credentials:
      azure_client_id: "mock-azure-client-id"
      azure_client_secret: "mock-azure-client-secret"
      azure_tenant_id: "55555555-5555-5555-5555-555555555555"
      azure_subscription_id: "66666666-6666-6666-6666-666666666666"
    tags:
      data_sensitivity: "CRITICAL_IDENTITY"
      compliance_frameworks: 
        - "iso-27001"
      network_segmentation: "tier-1-identity"
      endpoint_url: "http://127.0.0.1:10000"
      azure_location: "eastus"
      description: "Primary IDP. Susceptible to Container Escape and KeyVault exfiltration."
      threat_model: "LATERAL_MOVEMENT"

  # ----------------------------------------------------------------------------
  # [PROJ-DR-05] THE DISASTER RECOVERY FACILITY
  # ----------------------------------------------------------------------------
  - id: "PROJ-DR-05"
    name: "Disaster_Recovery_Cold"
    provider: "aws"
