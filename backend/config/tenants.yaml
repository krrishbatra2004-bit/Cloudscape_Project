      description: "Hosts proprietary LLM models and high-value DynamoDB training sets."
      threat_model: "DATA_POISONING_AND_LLM_EXFIL"
      machine_learning_workloads: true
      crown_jewel_paths:
        - "arn:aws:bedrock:us-west-2:333344445555:custom-model/Titan-Internal"

  # ----------------------------------------------------------------------------
