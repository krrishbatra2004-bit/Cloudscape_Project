  - id: "PROJ-OPS-07"
    name: "Enterprise_K8s_Mesh"
    provider: "multi" # Emulates spanning both EKS and AKS controls
    environment_type: "production"
    credentials:
      aws_access_key_id: "T-OPS-ACCESS-KEY"
      aws_secret_access_key: "T-OPS-SECRET-KEY"
      aws_account_id: "999911112222"
      azure_tenant_id: "77777777-7777-7777-7777-777777777777"
      azure_subscription_id: "88888888-8888-8888-8888-888888888888"
      azure_client_id: "mock-ops-client-id"
      azure_client_secret: "mock-ops-client-secret"
    tags:
      data_sensitivity: "MEDIUM"
      compliance_frameworks: 
        - "cis-kubernetes-v1.6"
      network_segmentation: "tier-2-compute"
      description: "Advanced container orchestration infrastructure. Prime target for Supply Chain attacks."
      threat_model: "SUPPLY_CHAIN_REGISTRY_POISONING"
      container_runtime: "containerd"
      orchestrator_version: "1.28"

